reference:
  - title: "Professional Women's Hockey League"
    desc: Functions exported by fastRhockey which provide access to PWHL data
    contents:
      - starts_with("pwhl")
  - title: "NHL Data"
  - subtitle: Game Data
    desc: Functions exported by fastRhockey sourced from the game endpoint of the NHL API
    contents:
      - "`nhl_game_boxscore`"
      - "`nhl_game_feed`"
      - "`nhl_game_pbp`"
      - "`nhl_game_shifts`"
      - "`nhl_game_story`"
      - "`nhl_game_content`"
      - "`nhl_gamecenter_landing`"
      - "`nhl_gamecenter_right_rail`"
  - subtitle: Teams Data
    desc: Functions exported by fastRhockey sourced from the teams endpoint of the NHL API
    contents:
      - "`nhl_teams`"
      - "`nhl_teams_info`"
      - "`nhl_teams_roster`"
      - "`nhl_teams_stats`"
      - "`nhl_team_prospects`"
      - "`nhl_team_scoreboard`"
      - "`espn_nhl_teams`"
  - subtitle: Club Data
    desc: Functions exported by fastRhockey for NHL club-level schedule and stats
    contents:
      - "`nhl_club_schedule`"
      - "`nhl_club_stats_season`"
  - subtitle: Players Data
    desc: Functions exported by fastRhockey sourced from the players endpoint of the NHL API
    contents:
      - "`nhl_player_info`"
      - "`nhl_player_game_log`"
      - "`nhl_player_spotlight`"
      - "`nhl_player_stats`"
  - subtitle: Roster Data
    desc: Functions exported by fastRhockey for NHL roster information
    contents:
      - "`nhl_roster_season`"
  - subtitle: Schedule Data
    desc: Functions exported by fastRhockey sourced from the schedule endpoint of the NHL API
    contents:
      - "`nhl_schedule`"
      - "`nhl_schedule_calendar`"
  - subtitle: Draft Data
    desc: Functions exported by fastRhockey sourced from the draft endpoint of the NHL API
    contents:
      - "`nhl_draft`"
      - "`nhl_draft_year`"
      - "`nhl_draft_prospects`"
      - "`nhl_draft_prospects_info`"
      - "`nhl_draft_rankings`"
  - subtitle: Standings Data
    desc: Functions exported by fastRhockey sourced from the standings endpoint of the NHL API
    contents:
      - "`nhl_standings`"
      - "`nhl_standings_season`"
  - subtitle: Scoreboard and Scores
    desc: Functions exported by fastRhockey for NHL scoreboard and scores data
    contents:
      - "`nhl_scoreboard`"
      - "`nhl_scores`"
  - subtitle: Playoffs Data
    desc: Functions exported by fastRhockey for NHL playoff data
    contents:
      - "`nhl_playoff_bracket`"
      - "`nhl_playoff_carousel`"
      - "`nhl_playoff_schedule`"
  - subtitle: Season and Stats Data
    desc: Functions exported by fastRhockey for NHL season metadata and aggregated stats
    contents:
      - "`nhl_seasons`"
      - "`nhl_stats_skaters`"
      - "`nhl_stats_goalies`"
      - "`nhl_stats_teams`"
      - "`nhl_stats_draft`"
      - "`nhl_stats_seasons`"
      - "`nhl_stats_misc`"
      - "`nhl_skater_stats_leaders`"
      - "`nhl_goalie_stats_leaders`"
  - subtitle: Broadcast and Odds
    desc: Functions exported by fastRhockey for broadcast availability and odds
    contents:
      - "`nhl_where_to_watch`"
      - "`nhl_partner_game_odds`"
      - "`nhl_tv_schedule`"
  - subtitle: Conference and Division Data
    desc: Functions exported by fastRhockey sourced from the conferences and divisions endpoints of the NHL API
    contents:
      - "`nhl_conferences`"
      - "`nhl_conferences_info`"
      - "`nhl_divisions`"
      - "`nhl_divisions_info`"
  - subtitle: Metadata
    desc: Functions exported by fastRhockey for NHL metadata and location lookups
    contents:
      - "`nhl_meta`"
      - "`nhl_location`"
  - title: "fastRhockey Data"
  - subtitle: Full Seasons of NHL Data
    desc: Functions exported by fastRhockey which load full seasons of fastRhockey NHL data
    contents:
      - "`load_nhl_pbp`"
      - "`load_nhl_team_box`"
      - "`load_nhl_player_box`"
      - "`load_nhl_rosters`"
      - "`load_nhl_schedule`"
  - subtitle: "Update or Create NHL Database"
    desc: Functions exported by fastRhockey which update and create a database of fastRhockey NHL play-by-play data
    contents:
      - "`update_nhl_db`"
  - title: Included data
    desc: Data included within the package
    contents:
      - "`data`"
  - title: "Helpers"
  - subtitle: Helper Functions
    desc: Functions used internally by fastRhockey which assist in transforming or loading data
    contents:
      - "`most_recent_nhl_season`"
      - "`most_recent_nhl_season_api_param`"
      - "`most_recent_phf_season`"
      - "`helper_nhl_calculate_xg`"
      - "`refresh_xg_models`"
  - title: "Deprecated PHF Functions"
    desc: >
      The Premier Hockey Federation (PHF) has ceased operations. These functions are
      deprecated and will emit warnings when called. Historical data may still be
      available via the load_phf_* functions.
    contents:
      - "`phf_game_all`"
      - "`phf_pbp`"
      - "`phf_team_box`"
      - "`phf_player_box`"
      - "`phf_schedule`"
      - "`phf_league_info`"
      - "`phf_game_raw`"
      - "`phf_game_details`"
      - "`phf_game_summary`"
      - "`phf_leaders`"
      - "`phf_player_stats`"
      - "`phf_standings`"
      - "`phf_team_roster`"
      - "`phf_team_stats`"
  - title: "Deprecated PHF Data Loaders"
    desc: >
      Data loaders for the defunct PHF league. Historical data may still be available
      but is no longer updated.
    contents:
      - "`load_phf_pbp`"
      - "`load_phf_team_box`"
      - "`load_phf_player_box`"
      - "`load_phf_rosters`"
      - "`load_phf_schedule`"
      - "`update_phf_db`"
